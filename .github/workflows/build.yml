name: Build Breeze APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Fixed: Matches the >=22.0.0 requirement in your logs

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Prepare and Build Environment
        run: |
          # 1. Clear previous failed attempts
          rm -rf www android package.json capacitor.config.json package-lock.json node_modules
          
          # 2. Setup folder and HTML
          mkdir www
          cp index.html www/index.html
          
          # 3. Install Capacitor (Now compatible with Node 22)
          npm init -y
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest
          
          # 4. Initialize Android Platform
          npx cap init "Breeze" "com.jees.breeze" --web-dir www
          npx cap add android
          
          # 5. Dependency Patch: Prevents the 'Duplicate Class' Kotlin error
          echo "configurations.all { resolutionStrategy.eachDependency { details -> if (details.requested.group == 'org.jetbrains.kotlin') { details.useVersion '1.9.10' } } }" >> android/build.gradle
          
          npx cap copy android

      - name: Compile Final APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Breeze-Weather-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
