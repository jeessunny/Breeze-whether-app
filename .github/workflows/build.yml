name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Initialize and Build APK
        run: |
          # This creates a lightweight TWA (Trusted Web Activity) APK
          npx @bubblewrap/cli init --manifest=https://breeze-weather-jees.vercel.app/manifest.json --yes
          npx @bubblewrap/cli build --yes

      - name: Upload APK
* uses: actions/upload-artifact@v4
        with:
          name: Breeze-Weather-APK
          path: ./*.apk
          
