name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft' # Microsoft or Temurin both work for Java 21
          java-version: '21'

      - name: Force Clean Build
        run: |
          rm -rf www android package.json capacitor.config.json package-lock.json node_modules
          mkdir www
          cp index.html www/
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "Breeze Weather" "com.jees.breezeweather" --web-dir www
          npx cap add android
          npx cap copy android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Breeze-Weather-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
