name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Prepare Files and Install Capacitor
        run: |
          # 1. Create a 'www' folder (Capacitor needs this)
          mkdir -p www
          
          # 2. Copy your index.html and any folders into 'www'
          # We use 'shopt' to avoid copying the 'www' folder into itself
          cp index.html www/ 2>/dev/null || :
          cp -r api www/ 2>/dev/null || :
          
          # 3. Initialize project
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # 4. Run Capacitor commands with the correct 'www' directory
          npx cap init "Breeze Weather" "com.jees.breezeweather" --web-dir www
          npx cap add android
          npx cap copy android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Breeze-Weather-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
