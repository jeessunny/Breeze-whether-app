<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    /* ── Reset ─────────────────────────────────────────────── */
    *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent!important;}
    button,a,[role="button"]{user-select:none;-webkit-user-select:none;}
    input,textarea,p,span,div{-webkit-user-select:auto;user-select:auto;}
    input,textarea{-webkit-user-select:text;user-select:text;}
    html,body{margin:0;padding:0;height:100%;overscroll-behavior-y:none;}

    /* ── iOS material tokens — dark (default) ────────────────── */
    :root{
      --ultra-thin: rgba(255,255,255,0.04);
      --thin:       rgba(255,255,255,0.08);
      --regular:    rgba(255,255,255,0.14);
      --thick:      rgba(255,255,255,0.22);
      --border-light: rgba(255,255,255,0.22);
      --border-dark:  rgba(0,0,0,0.08);
      --glass-1: rgba(255,255,255,0.04);
      --glass-2: rgba(255,255,255,0.08);
      --glass-3: rgba(255,255,255,0.14);
      --glass-border: rgba(255,255,255,0.22);
      --text-main: #ffffff;
      --text-sub:  rgba(255,255,255,0.7);
      --text-dim:  rgba(255,255,255,0.45);
      --accent: #48C6EF;
      --divider: rgba(255,255,255,0.1);
      --sat: env(safe-area-inset-top,0px);
      --sab: env(safe-area-inset-bottom,0px);
      --sal: env(safe-area-inset-left,0px);
    }

    [data-theme="light"]{
      --ultra-thin: rgba(255,255,255,0.12);
      --thin:       rgba(255,255,255,0.18);
      --regular:    rgba(255,255,255,0.28);
      --thick:      rgba(255,255,255,0.38);
      --border-light: rgba(0,0,0,0.07);
      --border-dark:  rgba(0,0,0,0.07);
      --glass-1: rgba(255,255,255,0.25);
      --glass-2: rgba(255,255,255,0.45);
      --glass-3: rgba(255,255,255,0.65);
      --glass-border: rgba(0,0,0,0.07);
      --text-main: #0b1a35;
      --text-sub:  rgba(11,26,53,0.75);
      --text-dim:  rgba(11,26,53,0.5);
      --divider: rgba(0,0,0,0.08);
    }

    body{
      background:
        radial-gradient(circle at 20% 20%, #1a2a4a 0%, transparent 42%),
        radial-gradient(circle at 80% 30%, #2d3f6b 0%, transparent 40%),
        radial-gradient(circle at 50% 85%, #0d1828 0%, transparent 50%),
        #0a0f1e;
      background-attachment: fixed;
      font-family:'DM Sans',sans-serif;
      color: var(--text-main);
      overflow-y: auto;
      -webkit-font-smoothing: antialiased;
    }
    [data-theme="light"] body{
      background:
        radial-gradient(circle at 15% 15%, #ffffff 0%, transparent 38%),
        radial-gradient(circle at 80% 25%, #d8e8ff 0%, transparent 40%),
        radial-gradient(circle at 50% 85%, #c8d8f0 0%, transparent 50%),
        #e0eaf5;
      background-attachment: fixed;
    }
    #root{min-height:100%;}

    .material,.glass{
      backdrop-filter: blur(30px) saturate(1.8);
      -webkit-backdrop-filter: blur(30px) saturate(1.8);
      border-radius: 18px;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border-light);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.25);
      transition: transform .12s ease;
    }
    .material:active,.glass:active{transform:scale(0.985);}
    .material::before,.glass::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      background:linear-gradient(180deg,rgba(255,255,255,0.35),transparent 40%);
      opacity:0.25;
      pointer-events:none;
      z-index:0;
    }
    .material>*,.glass>*{position:relative;z-index:1;}
    .m-ultra,.glass-1{ background:var(--ultra-thin); }
    .m-thin,.glass-2{  background:var(--thin); }
    .m-regular,.glass-3{ background:var(--regular); }
    .m-thick{          background:var(--thick); }
    @media(max-width:768px){
      .material,.glass{backdrop-filter:blur(22px) saturate(1.6);-webkit-backdrop-filter:blur(22px) saturate(1.6);}
    }
    [data-theme="light"] .material,
    [data-theme="light"] .glass{
      backdrop-filter: blur(36px) saturate(1.8);
      -webkit-backdrop-filter: blur(36px) saturate(1.8);
      border: 1px solid var(--border-dark);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.6), 0 2px 10px rgba(0,0,0,0.07);
    }
    .panel-in{background:rgba(20,25,40,0.88);}
    [data-theme="light"] .panel-in{
      background: rgba(245,247,252,0.94) !important;
    }

    .map-wrap{position:relative;border-radius:20px;overflow:hidden;height:220px;flex-shrink:0;}
    .map-canvas{position:absolute;inset:0;width:100%;height:100%;opacity:0;transition:opacity 1s ease;}
    .map-canvas.loaded{opacity:1;}

    .no-scroll::-webkit-scrollbar{display:none}
    .no-scroll{-ms-overflow-style:none;scrollbar-width:none}

    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{animation:spin .8s linear infinite;}

    button{line-height:0;}
    .tog{width:42px;height:24px;border-radius:12px;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;}
    .tog-k{position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.4);transition:transform .22s cubic-bezier(.34,1.56,.64,1);}

    .acc-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .35s ease,opacity .25s ease;opacity:0;}
    .acc-body.open{grid-template-rows:1fr;opacity:1;}
    .acc-inner{min-height:0;overflow:hidden;}

    .srch::placeholder{color:var(--text-dim);}
    .srch::-webkit-search-cancel-button,.srch::-webkit-search-decoration{-webkit-appearance:none;}

    .updating{filter:blur(4px);opacity:0.5;pointer-events:none;transition:filter .25s,opacity .25s;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
    @keyframes fadeOut{from{opacity:1}to{opacity:0}}
    .ob-in{animation:fadeUp .5s ease both;}
    .ob-out{animation:fadeOut .35s ease forwards;}

    @keyframes slideIn{from{transform:translateX(100%)}to{transform:none}}
    .panel-in{animation:slideIn .32s cubic-bezier(.32,.72,0,1) both;}

    .seg{display:flex;background:var(--thin);border-radius:16px;padding:6px;gap:6px;}
    .seg-btn{flex:1;padding:12px 8px;border-radius:12px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;transition:background .15s,color .15s;}

    /* ── Low Signal Mode — kill all motion ──────────────────── */
    html.low-signal *{
      animation:none!important;
      transition:none!important;
    }
    html.low-signal .material,
    html.low-signal .glass{
      backdrop-filter:none!important;
      -webkit-backdrop-filter:none!important;
    }

    .section-label{
      display:flex;align-items:center;gap:10px;
      padding:0;margin-bottom:10px;
    }
    .section-label-pill{
      display:inline-flex;align-items:center;gap:6px;flex-shrink:0;
      padding:4px 11px;
      background:var(--thin);
      border:1px solid var(--border-light);
      border-radius:20px;
    }
    .section-label-line{
      flex:1;height:1px;
      background:linear-gradient(90deg,var(--border-light) 0%,transparent 100%);
    }
  </style>
</head>
<body>
<div id="root"><div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.4);font-size:14px;gap:10px;"><div class="spin" style="width:18px;height:18px;border-radius:50%;border:2px solid rgba(72,198,239,.3);border-top-color:#48C6EF;"></div>Loading…</div></div>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo} = React;

/* ═══════════════════════════════════════════════════════
   DYNAMIC MAPS LOADER (Secure Vercel Setup)
═══════════════════════════════════════════════════════ */
let _mapPromise = null;
const loadGoogleMaps = async () => {
  if (window.google && window.google.maps) return;
  if (_mapPromise) return _mapPromise;
  
  _mapPromise = new Promise(async (resolve, reject) => {
    try {
      const response = await fetch('/api/get-map-key');
      const data = await response.json();
      
      const script = document.createElement('script');
      script.src = `https://maps.googleapis.com/maps/api/js?key=${data.key}&v=beta`;
      script.async = true;
      script.defer = true;
      script.onload = resolve;
      script.onerror = reject;
      document.head.appendChild(script);
    } catch (error) {
      console.error("Failed to load Google Maps API key:", error);
      reject(error);
    }
  });
  return _mapPromise;
};

/* ═══════════════════════════════════════════════════════
   UNIT HELPERS
═══════════════════════════════════════════════════════ */
const cvtT = (v,i) => { if(v==="--"||v==null) return "--"; return i ? Math.round(v*9/5+32) : v; };
const cvtW = (v,i) => { if(v==="--"||v==null) return "--"; return i ? Math.round(v*.621371) : v; };
const cvtV = (v,i) => { if(v==="--"||v==null) return "--"; return i ? Math.round(v*.621371*10)/10 : v; };
const tU = i => i?"°F":"°C";
const wU = i => i?"mph":"km/h";
const vU = i => i?"mi":"km";

/* ═══════════════════════════════════════════════════════
   THEME HELPERS
═══════════════════════════════════════════════════════ */
const resolveTheme = (pref,sysDark) => {
  if(pref==="dark")  return "dark";
  if(pref==="light") return "light";
  return sysDark ? "dark" : "light";
};

const getWeatherTint = (condition) => {
  if(!condition) return null;
  const c = condition.toLowerCase();
  if(c.includes("thunder"))                    return "rgba(120,100,255,0.20)";
  if(c.includes("rain")||c.includes("drizzle"))return "rgba(70,130,255,0.16)";
  if(c.includes("snow"))                       return "rgba(190,230,255,0.14)";
  if(c.includes("fog"))                        return "rgba(180,190,200,0.14)";
  if(c.includes("clear"))                      return "rgba(255,195,100,0.14)";
  if(c.includes("cloud"))                      return "rgba(160,180,200,0.10)";
  return null;
};

/* ═══════════════════════════════════════════════════════
   MAP CONSTANTS (Official Google Night Mode preset)
═══════════════════════════════════════════════════════ */
const DARK_MAP_STYLES = [
  { elementType: "geometry", stylers: [{ color: "#242f3e" }] },
  { elementType: "labels.text.stroke", stylers: [{ color: "#242f3e" }] },
  { elementType: "labels.text.fill", stylers: [{ color: "#746855" }] },
  { featureType: "administrative.locality", elementType: "labels.text.fill", stylers: [{ color: "#d59563" }] },
  { featureType: "poi", elementType: "labels.text.fill", stylers: [{ color: "#d59563" }] },
  { featureType: "poi.park", elementType: "geometry", stylers: [{ color: "#263c3f" }] },
  { featureType: "poi.park", elementType: "labels.text.fill", stylers: [{ color: "#6b9a76" }] },
  { featureType: "road", elementType: "geometry", stylers: [{ color: "#38414e" }] },
  { featureType: "road", elementType: "geometry.stroke", stylers: [{ color: "#212a37" }] },
  { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#9ca5b3" }] },
  { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#746855" }] },
  { featureType: "road.highway", elementType: "geometry.stroke", stylers: [{ color: "#1f2835" }] },
  { featureType: "road.highway", elementType: "labels.text.fill", stylers: [{ color: "#f3d19c" }] },
  { featureType: "transit", elementType: "geometry", stylers: [{ color: "#2f3948" }] },
  { featureType: "transit.station", elementType: "labels.text.fill", stylers: [{ color: "#d59563" }] },
  { featureType: "water", elementType: "geometry", stylers: [{ color: "#17263c" }] },
  { featureType: "water", elementType: "labels.text.fill", stylers: [{ color: "#515c6d" }] },
  { featureType: "water", elementType: "labels.text.stroke", stylers: [{ color: "#17263c" }] }
];

/* ═══════════════════════════════════════════════════════
   GEOCODER
═══════════════════════════════════════════════════════ */
const _fetchWithTimeout = async (url, opts={}, ms=7000) => {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  try { return await fetch(url, {...opts, signal:ctrl.signal}); }
  finally { clearTimeout(timer); }
};

const geocodeWithOSM = async (query) => {
  if(!query?.trim()) throw new Error("Empty search query");
  const q = query.trim();
  try {
    const r = await _fetchWithTimeout(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=en&format=json`,{},6000);
    if(r.status===429) throw new Error("rate_limit");
    if(r.ok){
      const d = await r.json();
      const v = d?.results?.[0];
      if(v) return {lat:Number(v.latitude),lon:Number(v.longitude),village:(v.name||q).trim(),district:v.admin1||"",state:v.country||"",display:(v.name||q).trim()};
    }
  } catch(e){ if(e.message==="rate_limit") throw new Error("Rate limit reached. Please wait a moment."); }
  try {
    const r2 = await _fetchWithTimeout(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&addressdetails=1`,{headers:{"Accept-Language":"en","User-Agent":"BreezeWeatherApp/12"}},7000);
    if(r2.status===429) throw new Error("Rate limit (Nominatim). Please wait.");
    if(r2.ok){
      const d2 = await r2.json();
      if(d2?.length>0){
        const row=d2[0], addr=row.address||{};
        const name=addr.city||addr.town||addr.village||addr.municipality||addr.county||row.display_name.split(",")[0].trim()||q;
        return {lat:parseFloat(row.lat),lon:parseFloat(row.lon),village:name,district:addr.state_district||addr.county||addr.state||"",state:addr.country||"",display:name};
      }
    }
  } catch(e){ if(e.message.startsWith("Rate")) throw e; }
  throw new Error(`"${q}" not found. Try a nearby city.`);
};

/* ═══════════════════════════════════════════════════════
   WMO CODE MAPPER
═══════════════════════════════════════════════════════ */
const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const getWeatherDetails = (code) => {
  const c = Number(code??0);
  if(c===0)          return {icon:"☀️", condition:"Clear Sky",         isStorm:false};
  if(c===1)          return {icon:"🌤️",condition:"Mostly Clear",       isStorm:false};
  if(c===2)          return {icon:"⛅",  condition:"Partly Cloudy",     isStorm:false};
  if(c===3)          return {icon:"☁️",  condition:"Overcast",          isStorm:false};
  if(c===45||c===48) return {icon:"🌫️",condition:"Foggy",              isStorm:false};
  if(c>=51&&c<=57)   return {icon:"🌦️",condition:"Drizzle",            isStorm:true };
  if(c>=61&&c<=67)   return {icon:"🌧️",condition:"Rain",               isStorm:true };
  if(c>=71&&c<=77)   return {icon:"🌨️",condition:"Snow",               isStorm:true };
  if(c>=80&&c<=82)   return {icon:"🌧️",condition:"Rain Showers",       isStorm:true };
  if(c===85||c===86) return {icon:"🌨️",condition:"Snow Showers",       isStorm:true };
  if(c===95)         return {icon:"⛈️",  condition:"Thunderstorm",      isStorm:true };
  if(c===96||c===99) return {icon:"⛈️",  condition:"Heavy Thunderstorm",isStorm:true };
  return {icon:"🌡️",condition:"Unknown",isStorm:false};
};

/* ═══════════════════════════════════════════════════════
   FETCH WEATHER
═══════════════════════════════════════════════════════ */
const fetchWeather = async (lat, lon) => {
  try {
    const wUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,surface_pressure,dew_point_2m,uv_index,visibility&hourly=temperature_2m,precipitation,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,uv_index_max,precipitation_sum,sunrise,sunset,wind_speed_10m_max&timezone=auto&forecast_days=7`;
    const aqUrl = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=european_aqi,pm10,pm2_5`;
    const wCtrl=new AbortController(), aqCtrl=new AbortController();
    const wT=setTimeout(()=>wCtrl.abort(),10000), aqT=setTimeout(()=>aqCtrl.abort(),8000);
    let wRes,aqRes;
    try {
      [wRes,aqRes] = await Promise.all([
        fetch(wUrl,{signal:wCtrl.signal}),
        fetch(aqUrl,{signal:aqCtrl.signal}).catch(e=>{return null;}),
      ]);
    } finally { clearTimeout(wT); clearTimeout(aqT); }
    if(!wRes.ok) throw new Error(`Weather API ${wRes.status}`);
    const [wData,aqData] = await Promise.all([wRes.json(), aqRes?.json().catch(()=>null)]);

    const c=wData.current||{};
    const wd=getWeatherDetails(c.weather_code);
    const nr=v=>v!=null?Math.round(v):"--";
    const nf=(v,d=1)=>v!=null?Number(v.toFixed(d)):"--";

    const currentWeather = {
      temperature:nr(c.temperature_2m), feelslike:nr(c.apparent_temperature),
      humidity:nr(c.relative_humidity_2m), precipitation:nf(c.precipitation),
      windspeed:nr(c.wind_speed_10m), pressure:nr(c.surface_pressure),
      dewPoint:nr(c.dew_point_2m), uv_index:nr(c.uv_index),
      visibility:c.visibility!=null?nr(c.visibility/1000):"--", 
      icon:wd.icon, condition:wd.condition, isStorm:wd.isStorm, conditionCode:wd.isStorm?"storm":"clear",
    };

    const hTimes=wData.hourly?.time||[];
    const targetLocalTime = c.time || new Date().toISOString().slice(0,16);
    const targetHour = targetLocalTime.slice(0,13); 
    let si=hTimes.findIndex(t=>t.slice(0,13)>=targetHour); if(si<0)si=0;
    
    const hourly=hTimes.slice(si,si+24).map((t,i)=>{
      const idx=si+i, hwd=getWeatherDetails(wData.hourly.weather_code?.[idx]), hr=parseInt(t.slice(11,13),10);
      return {time:String(hr).padStart(2,"0")+":00",temp:nr(wData.hourly.temperature_2m?.[idx]),icon:hwd.icon,condition:hwd.condition,precipitation:nf(wData.hourly.precipitation?.[idx]),windspeed:nr(wData.hourly.wind_speed_10m?.[idx])};
    });

    const dTimes=wData.daily?.time||[];
    const daily=dTimes.map((t,i)=>{
      const [yy,mm,dd] = t.split("-").map(Number);
      const d = new Date(yy, mm-1, dd); 
      const dwd=getWeatherDetails(wData.daily.weather_code?.[i]);
      const srRaw=(wData.daily.sunrise?.[i]||"").slice(11,16)||"06:00";
      const ssRaw=(wData.daily.sunset?.[i]||"").slice(11,16)||"18:00";
      const toMin=s=>{try{const[h,m]=(s||"00:00").split(":").map(Number);return h*60+m;}catch{return 0;}};
      const dl=((toMin(ssRaw)-toMin(srRaw))/60).toFixed(1);
      const precip=nf(wData.daily.precipitation_sum?.[i]);
      const dayHours=[];
      hTimes.forEach((ht,hi)=>{
        if(!ht.startsWith(t))return;
        const hr=parseInt(ht.slice(11,13),10);
        if(![6,9,12,15,18,21].includes(hr))return;
        const hwd2=getWeatherDetails(wData.hourly.weather_code?.[hi]);
        dayHours.push({time:String(hr).padStart(2,"0")+":00",temp:nr(wData.hourly.temperature_2m?.[hi]),icon:hwd2.icon,precipitation:nf(wData.hourly.precipitation?.[hi])});
      });
      return {
        name:i===0?"Today":DAYS[d.getDay()],
        lo:nr(wData.daily.temperature_2m_min?.[i]),hi:nr(wData.daily.temperature_2m_max?.[i]),
        icon:dwd.icon,condition:dwd.condition,
        windSpeed:nr(wData.daily.wind_speed_10m_max?.[i]),
        humidity:nr(c.relative_humidity_2m),uvIndex:nr(wData.daily.uv_index_max?.[i]),
        pressure:nr(c.surface_pressure),dewPoint:nr(c.dew_point_2m),
        precipitation:precip,
        summary:dwd.condition+(precip>0?` · ${precip} mm expected.`:" · Dry conditions."),
        hours:dayHours,sunrise:srRaw,sunset:ssRaw,daylight_hours:parseFloat(dl),
      };
    });

    const aq=aqData?.current||{};
    const aqi={value:aq.european_aqi!=null?Math.round(aq.european_aqi):null,pollutant:(aq.pm2_5!=null&&aq.pm10!=null)?(aq.pm2_5>=aq.pm10?"PM2.5":"PM10"):"AQI"};
    const d0=daily[0]||{};
    const sun_moon={sunrise:d0.sunrise||"06:00",sunset:d0.sunset||"18:00",daylight_hours:d0.daylight_hours||12,moon_emoji:"🌙"};
    const tzParts=(wData.timezone||"Asia/Kolkata").split("/");
    const locationFromApi={village:(tzParts[1]||"Location").replace(/_/g," "),district:tzParts[0]||"",state:""};
    return {currentWeather,hourly,daily,aqi,sun_moon,locationFromApi};
  } catch(e){ return null; }
};

/* ═══════════════════════════════════════════════════════
   AQI
═══════════════════════════════════════════════════════ */
const AQI_L=[

/* ═══════════════════════════════════════════════════════
   MAP HERO
═══════════════════════════════════════════════════════ */
const MapHero=({isDark,coords,activeLocation,lowSig,onDisableLowSig})=>{
  const mapRef=useRef(null), instRef=useRef(null), markerRef=useRef(null);

  // ALL hooks must come before any conditional return — Rules of Hooks
  useEffect(()=>{
    if(lowSig) return; // don't init map in low signal mode
    let attempts=0,fallbackTimer=null,tilesListener=null,retryTimer=null,unmounted=false;
    const tryInit= async ()=>{
      try{
        if(unmounted||!mapRef.current) return;
        if(!window.google || !window.google.maps) {
          await loadGoogleMaps().catch(()=>{});
        }
        if(!window.google||!window.google.maps||typeof window.google.maps.Map!=="function"){
          if(++attempts<100) retryTimer=setTimeout(tryInit,100);
          return;
        }
        if(instRef.current) return;
        const lat=coords?.lat!=null?Number(coords.lat):11.5728, lng=coords?.lon!=null?Number(coords.lon):76.0808;
        const map=new window.google.maps.Map(mapRef.current,{
          center:{lat,lng},zoom:13.5,
          tilt:window.innerWidth>768?67:0,heading:45,
          disableDefaultUI:true,
          gestureHandling:"none",
          zoomControl:false,
          scrollwheel:false,
          keyboardShortcuts:false,clickableIcons:false,
          styles:isDark?DARK_MAP_STYLES:[],
        });
        instRef.current=map;
        markerRef.current=new window.google.maps.Marker({
          position:{lat,lng},map,title:activeLocation?.village||"Breeze",
          animation:(window.google.maps.Animation&&window.google.maps.Animation.DROP)||null,
          icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:8,fillColor:"#48C6EF",fillOpacity:1,strokeColor:"white",strokeWeight:2.5},
        });
        tilesListener=map.addListener("tilesloaded",()=>{if(!unmounted&&mapRef.current) mapRef.current.classList.add("loaded");});
        fallbackTimer=setTimeout(()=>{if(!unmounted&&mapRef.current) mapRef.current.classList.add("loaded");},3000);
      }catch(e){}
    };
    tryInit();
    return()=>{
      unmounted=true;
      if(retryTimer) clearTimeout(retryTimer);
      if(fallbackTimer) clearTimeout(fallbackTimer);
      if(tilesListener){if(tilesListener.remove)tilesListener.remove();else if(window.google?.maps?.event)window.google.maps.event.removeListener(tilesListener);}
      if(markerRef.current) markerRef.current.setMap(null);
    };
  },[lowSig]);

  useEffect(()=>{
    if(lowSig) return;
    try{
      const map=instRef.current; if(!map) return;
      const lat=coords?.lat!=null?Number(coords.lat):11.5728, lng=coords?.lon!=null?Number(coords.lon):76.0808;
      map.panTo({lat,lng});
      const _tiltTimer=setTimeout(()=>{if(instRef.current&&typeof instRef.current.setTilt==="function") instRef.current.setTilt(window.innerWidth>768?67:0);},600);
      if(markerRef.current){markerRef.current.setPosition({lat,lng});markerRef.current.setTitle(activeLocation?.village||"Breeze");}
      return()=>clearTimeout(_tiltTimer);
    }catch(e){}
  },[coords?.lat,coords?.lon]);

  useEffect(()=>{
    if(lowSig) return;
    try{
      const map=instRef.current;
      if(!map) return;
      map.setOptions({styles:isDark?DARK_MAP_STYLES:[]});
      const center=map.getCenter();
      if(center) map.setCenter(center);
    }catch(e){}
  },[isDark]);

  // Conditional render AFTER all hooks
  if(lowSig){
    return(
      <div style={{height:"220px",borderRadius:"20px",background:"linear-gradient(160deg,#1a2a4a,#0d1828)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px",border:"1px solid var(--border-light)",position:"relative"}}>
        <button onClick={onDisableLowSig} style={{
          position:"absolute",top:"14px",right:"14px",
          width:"34px",height:"34px",borderRadius:"50%",
          background:"var(--thin)",border:"1px solid var(--border-light)",
          display:"flex",alignItems:"center",justifyContent:"center",
          cursor:"pointer",flexShrink:0,lineHeight:0,padding:0,
        }}>
          <I.X s={16} c="var(--text-main)"/>
        </button>
        <div style={{marginBottom:"10px",opacity:0.5}}><I.Wifi0 s={28} c="var(--text-main)"/></div>
        <span style={{fontSize:"13px",fontWeight:600,color:"var(--text-main)",marginBottom:"4px"}}>Low Signal Mode</span>
        <span style={{fontSize:"11.5px",color:"var(--text-dim)",textAlign:"center",maxWidth:"200px",lineHeight:"1.5"}}>Map and animations disabled to save data</span>
      </div>
    );
  }

  return(
    <div className="map-wrap">
      <div ref={mapRef} className="map-canvas" style={{filter:isDark?"brightness(0.95)":"brightness(0.95)"}}/>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   NOTIFICATION HOOK
═══════════════════════════════════════════════════════ */
const useWeatherAlerts=(alerts,scene)=>{
  const notifiedRef=useRef(new Set());
  useEffect(()=>{
    if(!alerts?.length||!("Notification" in window)||Notification.permission!=="granted") return;
    const timer=setTimeout(()=>{
      alerts.forEach(a=>{
        const key=`${scene}:${a.id}`;
        if(notifiedRef.current.has(key)) return;
        notifiedRef.current.add(key);
        new Notification(a.title,{body:a.desc,icon:"/icon-192.png",tag:`breeze-${a.id}`});
      });
    },1500);
    return()=>clearTimeout(timer);
  },[scene]);
};

/* ═══════════════════════════════════════════════════════
   WELCOME OVERLAY
═══════════════════════════════════════════════════════ */
const WelcomeOverlay=({onComplete})=>{
  const [exiting,setExiting]=useState(false);
  const [step,setStep]=useState("idle");

  const go=async()=>{
    setStep("requesting");
    await new Promise(resolve=>{
      if(!navigator.geolocation){resolve();return;}
      navigator.geolocation.getCurrentPosition(resolve,resolve,{timeout:8000});
    });
    if("Notification" in window&&Notification.permission==="default"){
      try{await Notification.requestPermission();}catch{}
    }
    try{localStorage.setItem("breeze_onboarded","true");}catch{}
    setExiting(true);
    setTimeout(()=>onComplete(),400);
  };

  return(
    <div className={exiting?"ob-out":""} style={{position:"fixed",inset:0,zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(5,8,20,0.85)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",padding:"24px"}}>
      <div className="ob-in glass" style={{width:"100%",maxWidth:"340px",padding:"36px 28px 28px",textAlign:"center",borderColor:"rgba(72,198,239,0.2)"}}>
        <div style={{fontSize:"44px",marginBottom:"20px"}}>🌤️</div>
        <div style={{fontFamily:"'Urbanist',sans-serif",fontSize:"24px",fontWeight:800,color:"var(--text-main)",letterSpacing:"-0.02em",marginBottom:"10px"}}>Welcome to Breeze</div>
        <div style={{fontSize:"14px",color:"var(--text-sub)",lineHeight:"1.65",marginBottom:"28px"}}>
          For hyper-local weather and alerts, Breeze needs your{" "}
          <span style={{color:"var(--text-main)"}}>location and notification</span> permissions.
        </div>
        <div style={{display:"flex",gap:"8px",justifyContent:"center",marginBottom:"24px",flexWrap:"wrap"}}>
          {[["📍","Location"],["🔔","Alerts"]].map(([icon,label])=>(
            <div key={label} style={{display:"flex",alignItems:"center",gap:"5px",padding:"5px 11px",borderRadius:"20px",background:"rgba(72,198,239,0.08)",border:"1px solid rgba(72,198,239,0.18)"}}>
              <span style={{fontSize:"12px"}}>{icon}</span>
              <span style={{fontSize:"11.5px",color:"var(--text-main)",fontWeight:500}}>{label}</span>
            </div>
          ))}
        </div>
        <button onClick={go} disabled={step==="requesting"}
          style={{width:"100%",padding:"14px",borderRadius:"14px",border:"none",cursor:step==="requesting"?"default":"pointer",fontFamily:"'Urbanist',sans-serif",fontSize:"15px",fontWeight:700,background:step==="requesting"?"rgba(72,198,239,0.2)":"#48C6EF",color:step==="requesting"?"rgba(72,198,239,0.7)":"white",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px"}}>
          {step==="requesting"&&<div className="spin" style={{width:"15px",height:"15px",borderRadius:"50%",border:"2px solid rgba(72,198,239,.3)",borderTopColor:"#48C6EF"}}/>}
          {step==="requesting"?"Requesting…":"Grant Permissions"}
        </button>
        <button onClick={()=>{try{localStorage.setItem("breeze_onboarded","true");}catch{}onComplete();}}
          style={{background:"none",border:"none",cursor:"pointer",fontSize:"12px",color:"var(--text-dim)",marginTop:"14px",padding:"4px"}}>
          Skip for now
        </button>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════ */
const App=()=>{
  const [onboarded,setOnboarded]=useState(()=>{
    try{
      const s=localStorage.getItem("breeze_onboarded")==="true";
      if(!s) return false;
      const ok="Notification" in window?Notification.permission!=="default":true;
      return ok;
    }catch{return false;}
  });
  
  const [imp,setImp]=useState(()=>localStorage.getItem("bz_imp")==="true");
  const [themePref,setThemePref]=useState(()=>localStorage.getItem("bz_theme")||"system");
  const [lowSig,setLowSig]=useState(()=>{
    const saved = localStorage.getItem("bz_lowsig");
    if(saved !== null) return saved==="true";
    try{return(navigator.hardwareConcurrency||4)<4;}catch{return false;}
  });
  
  const [sysDark,setSysDark]=useState(()=>window.matchMedia("(prefers-color-scheme:dark)").matches);
  const [settOpen,setSettOpen]=useState(false);
  const [notifPerm,setNotifPerm]=useState(()=>"Notification" in window?Notification.permission:"denied");

  const [coords,setCoords]=useState({lat:11.5728,lon:76.0808});
  const [geoState,setGeoState]=useState("pending");
  const [activeLocation,setActiveLocation]=useState(null);

  const [liveWeather,setLiveWeather]=useState(null);
  const [liveHourly,setLiveHourly]=useState([]);
  const [liveDaily,setLiveDaily]=useState([]);
  const [liveAqi,setLiveAqi]=useState(null);
  const [liveSunMoon,setLiveSunMoon]=useState(null);
  const [weatherLoading,setWeatherLoading]=useState(true);
  const [weatherError,setWeatherError]=useState(null);
  const [searchError,setSearchError]=useState(null);

  useEffect(()=>{ localStorage.setItem("bz_imp",imp); },[imp]);
  useEffect(()=>{ localStorage.setItem("bz_theme",themePref); },[themePref]);
  useEffect(()=>{ localStorage.setItem("bz_lowsig",lowSig); },[lowSig]);

  useEffect(()=>{
    const mq=window.matchMedia("(prefers-color-scheme:dark)");
    const h=e=>setSysDark(e.matches);
    if(mq.addEventListener) mq.addEventListener("change",h);
    else mq.addListener(h);
    return()=>{
      if(mq.removeEventListener) mq.removeEventListener("change",h);
      else mq.removeListener(h);
    };
  },[]);

  useEffect(()=>{
    const dark=resolveTheme(themePref,sysDark)==="dark";
    document.documentElement.setAttribute("data-theme",dark?"dark":"light");
  },[themePref,sysDark]);

  useEffect(()=>{
    if(lowSig) document.documentElement.classList.add("low-signal");
    else document.documentElement.classList.remove("low-signal");
  },[lowSig]);

  useEffect(()=>{
    const lock=settOpen||!onboarded;
    document.body.style.overflow=lock?"hidden":"";
    document.body.style.touchAction=lock?"none":"";
    return()=>{document.body.style.overflow="";document.body.style.touchAction="";};
  },[settOpen,onboarded]);

  useEffect(()=>{
    if(!onboarded) return;
    try{
      if(!navigator.geolocation){setGeoState("denied");return;}
      navigator.geolocation.getCurrentPosition(
        pos=>{try{setCoords({lat:pos.coords.latitude,lon:pos.coords.longitude});setGeoState("got");}catch{}},
        ()=>setGeoState("denied"),
        {timeout:8000,maximumAge:60000}
      );
    }catch{setGeoState("denied");}
  },[onboarded]);

  useEffect(()=>{
    let cancelled=false;
    const load=async()=>{
      setWeatherLoading(true);setWeatherError(null);
      const data=await fetchWeather(coords.lat,coords.lon);
      if(cancelled) return;
      if(data){
        setLiveWeather(data.currentWeather);setLiveHourly(data.hourly);
        setLiveDaily(data.daily);setLiveAqi(data.aqi);setLiveSunMoon(data.sun_moon);
        if(!activeLocation) setActiveLocation({...data.locationFromApi,display:data.locationFromApi.village});
      } else {
        setWeatherError("Could not load weather data.");
      }
      setWeatherLoading(false);
    };
    load();
    return()=>{cancelled=true;};
  },[coords.lat,coords.lon]);

  const isDark=resolveTheme(themePref,sysDark)==="dark";
  const scene=liveWeather?.isStorm?"storm":"clear";
  const cw=liveWeather||{temperature:"--",feelslike:"--",humidity:"--",windspeed:"--",uv_index:"--",visibility:"--",precipitation:"--",pressure:"--",dewPoint:"--",icon:"🌡️",condition:weatherLoading?"Loading…":"—",isStorm:false};
  const aqi=liveAqi||{value:null,pollutant:"AQI"};
  const sun_moon=liveSunMoon||{sunrise:"06:00",sunset:"18:00",daylight_hours:12,moon_emoji:"🌙"};
  const displayLocation=activeLocation||{village:"Breeze",district:weatherLoading?"Loading…":"Wayanad",state:"Kerala"};

  const handleSearch=useCallback(async q=>{
    if(!q?.trim()) return;
    setSearchError(null);
    setActiveLocation({village:q,district:"Searching…",state:"",display:q});
    setWeatherLoading(true);
    try{
      const geo=await geocodeWithOSM(q);
      setCoords({lat:geo.lat,lon:geo.lon});
      setActiveLocation({village:geo.village,district:geo.district,state:geo.state,display:geo.display});
    }catch(e){
      setSearchError(e.message);
      setActiveLocation(null);
      setWeatherLoading(false);
    }
  },[]);

  return(
    <div style={{minHeight:"100vh",fontFamily:"'DM Sans',sans-serif"}}>
      {weatherLoading&&!liveWeather&&(
        <div style={{position:"fixed",inset:0,zIndex:50,background:"rgba(0,0,0,0.4)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",backdropFilter:"blur(8px)",gap:"14px"}}>
          <div className="spin" style={{width:"28px",height:"28px",borderRadius:"50%",border:"3px solid rgba(72,198,239,.25)",borderTopColor:"#48C6EF"}}/>
          <div style={{fontSize:"14px",fontWeight:300,color:"var(--text-sub)",letterSpacing:"0.03em"}}>Fetching weather…</div>
        </div>
      )}

      <div style={{minHeight:"100dvh",padding:"16px",paddingTop:`calc(var(--sat,0px) + 16px)`,paddingBottom:`calc(var(--sab,0px) + 16px)`,display:"flex",flexDirection:"column",gap:"12px"}}>
        <SearchBar location={displayLocation} onSearch={handleSearch} onSettings={()=>setSettOpen(true)} loading={weatherLoading&&!!liveWeather}/>

        {searchError&&(
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderRadius:"12px",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.2)"}}>
            <span style={{fontSize:"12px",color:"#fca5a5"}}>🔍 {searchError}</span>
            <button onClick={()=>setSearchError(null)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-dim)",fontSize:"16px",padding:"0 2px"}}>×</button>
          </div>
        )}
        {weatherError&&(
          <div style={{padding:"10px 14px",borderRadius:"12px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.15)",fontSize:"12px",color:"rgba(255,150,150,0.8)"}}>⚠️ {weatherError}</div>
        )}

        {lowSig ? (
          /* ── LOW SIGNAL LAYOUT: only the hero card + a subtle exit banner ── */
          <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
            <HeroCard cw={cw} location={displayLocation} imp={imp}/>
            {/* Low signal exit banner */}
            <div style={{
              display:"flex",alignItems:"center",justifyContent:"space-between",
              padding:"10px 14px",borderRadius:"14px",
              background:isDark?"rgba(255,255,255,0.05)":"rgba(0,0,0,0.04)",
              border:`1px solid ${isDark?"rgba(255,255,255,0.1)":"rgba(0,0,0,0.08)"}`,
            }}>
              <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                <I.Wifi0 s={13} c="var(--text-dim)"/>
                <span style={{fontSize:"12px",color:"var(--text-dim)",fontWeight:500}}>Low Signal Mode</span>
              </div>
              <button onClick={()=>setLowSig(false)} style={{
                width:"28px",height:"28px",borderRadius:"50%",
                background:isDark?"rgba(255,255,255,0.08)":"rgba(0,0,0,0.06)",
                border:`1px solid ${isDark?"rgba(255,255,255,0.14)":"rgba(0,0,0,0.1)"}`,
                display:"flex",alignItems:"center",justifyContent:"center",
                cursor:"pointer",padding:0,lineHeight:0,flexShrink:0,
              }}>
                <I.X s={13} c="var(--text-main)"/>
              </button>
            </div>
          </div>
        ) : (
          /* ── NORMAL LAYOUT ── */
          <>
            <MapHero isDark={isDark} coords={coords} activeLocation={displayLocation} lowSig={lowSig} onDisableLowSig={()=>setLowSig(false)}/>
            <div key={`${coords.lat},${coords.lon}`} className={weatherLoading&&liveWeather?"updating":""} style={{display:"flex",flexDirection:"column",gap:"12px"}}>
              <HeroCard cw={cw} location={displayLocation} imp={imp}/>
              <StatGrid cw={cw} imp={imp}/>
              <ExtMetrics cw={cw}/>
              <HourlyScroll hourly={liveHourly} imp={imp}/>
              <div style={{display:"flex",gap:"12px"}}>
                <AQICard aqi={aqi}/>
                <SunCard sun_moon={sun_moon}/>
              </div>
              <DailyAccordion daily={liveDaily} imp={imp}/>
            </div>
            <div style={{textAlign:"center",fontSize:"10.5px",color:"var(--text-dim)",paddingTop:"4px"}}>
              {geoState==="got"?`📍 ${coords?.lat?.toFixed(4)}°N ${coords?.lon?.toFixed(4)}°E · Live`:"Breeze · Open-Meteo · OSM"}
            </div>
          </>
        )}
      </div>

      <SettingsPanel open={settOpen} onClose={()=>setSettOpen(false)}
        imp={imp} setImp={setImp} lowSig={lowSig} setLowSig={setLowSig}
        themePref={themePref} setThemePref={setThemePref}
        notifPerm={notifPerm} geoState={geoState}
        onRequestNotif={async()=>{if(!("Notification" in window))return;const p=await Notification.requestPermission();setNotifPerm(p);}}/>

      {!onboarded&&(
        <WelcomeOverlay onComplete={()=>{
          setOnboarded(true);
          if(navigator.geolocation) navigator.geolocation.getCurrentPosition(
            pos=>{setCoords({lat:pos.coords.latitude,lon:pos.coords.longitude});setGeoState("got");},
            ()=>setGeoState("denied"),{timeout:8000,maximumAge:60000}
          );
          if("Notification" in window) setNotifPerm(Notification.permission);
        }}/>
      )}
    </div>
  );
};

class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(e){return{hasError:true,error:e};}
  render(){
    if(this.state.hasError) return(
      <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#0a0f1e",color:"var(--text-main)",padding:"24px",textAlign:"center",fontFamily:"'DM Sans',sans-serif"}}>
        <div style={{fontSize:"36px",marginBottom:"14px"}}>⚠️</div>
        <div style={{fontSize:"17px",fontWeight:700,marginBottom:"8px"}}>Breeze encountered an error</div>
        <div style={{fontSize:"13px",opacity:.4,marginBottom:"22px"}}>{this.state.error?.message||"Unknown error"}</div>
        <button onClick={()=>window.location.reload()} style={{padding:"10px 22px",borderRadius:"12px",border:"none",cursor:"pointer",background:"#48C6EF",color:"var(--text-main)",fontWeight:600,fontSize:"14px"}}>Reload App</button>
      </div>
    );
    return this.props.children;
  }
}

const _mount=()=>{
  const el=document.getElementById("root");
  if(!el){return;}
  ReactDOM.createRoot(el).render(<ErrorBoundary><App/></ErrorBoundary>);
};
if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",_mount);
else _mount();
</script>
</body>
</html>
