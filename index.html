<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Vercel Analytics -->
  <script src="/_vercel/analytics/script.js"></script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Breeze</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@200;300;400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ── Reset ─────────────────────────────────────────────── */
    *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent!important;}
    button,a,[role="button"]{user-select:none;-webkit-user-select:none;}
    input,textarea,p,span,div{-webkit-user-select:auto;user-select:auto;}
    input,textarea{-webkit-user-select:text;user-select:text;}
    html,body{margin:0;padding:0;height:100%;overscroll-behavior-y:none;}

    /* ── Material tokens ── */
    :root{
      --ultra-thin: rgba(255,255,255,0.04);
      --thin:       rgba(255,255,255,0.08);
      --regular:    rgba(255,255,255,0.14);
      --thick:      rgba(255,255,255,0.22);
      --border-light: rgba(255,255,255,0.22);
      --border-dark:  rgba(0,0,0,0.08);
      --text-main: #ffffff;
      --text-sub:  rgba(255,255,255,0.7);
      --text-dim:  rgba(255,255,255,0.45);
      --accent: #48C6EF;
      --divider: rgba(255,255,255,0.1);
      --sat: env(safe-area-inset-top,0px);
      --sab: env(safe-area-inset-bottom,0px);
      --sal: env(safe-area-inset-left,0px);
    }

    [data-theme="light"]{
      --ultra-thin: rgba(255,255,255,0.12);
      --thin:       rgba(255,255,255,0.18);
      --regular:    rgba(255,255,255,0.28);
      --thick:      rgba(255,255,255,0.38);
      --border-light: rgba(0,0,0,0.07);
      --border-dark:  rgba(0,0,0,0.07);
      --text-main: #0b1a35;
      --text-sub:  rgba(11,26,53,0.75);
      --text-dim:  rgba(11,26,53,0.5);
      --divider: rgba(0,0,0,0.08);
    }

    body{
      background:
        radial-gradient(circle at 20% 20%, #1a2a4a 0%, transparent 42%),
        radial-gradient(circle at 80% 30%, #2d3f6b 0%, transparent 40%),
        radial-gradient(circle at 50% 85%, #0d1828 0%, transparent 50%),
        #0a0f1e;
      background-attachment: fixed;
      font-family:'DM Sans',sans-serif;
      color: var(--text-main);
      overflow-y: auto;
      -webkit-font-smoothing: antialiased;
    }
    [data-theme="light"] body{
      background:
        radial-gradient(circle at 15% 15%, #ffffff 0%, transparent 38%),
        radial-gradient(circle at 80% 25%, #d8e8ff 0%, transparent 40%),
        radial-gradient(circle at 50% 85%, #c8d8f0 0%, transparent 50%),
        #e0eaf5;
      background-attachment: fixed;
    }
    #root{min-height:100%;}

    /* ── Components ── */
    .material,.glass{
      backdrop-filter: blur(30px) saturate(1.8);
      -webkit-backdrop-filter: blur(30px) saturate(1.8);
      border-radius: 18px;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border-light);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.25);
      transition: transform .12s ease;
    }
    .material:active,.glass:active{transform:scale(0.985);}
    .material::before,.glass::before{
      content:""; position:absolute; inset:0; border-radius:inherit;
      background:linear-gradient(180deg,rgba(255,255,255,0.35),transparent 40%);
      opacity:0.25; pointer-events:none; z-index:0;
    }
    .material>*,.glass>*{position:relative;z-index:1;}
    .m-ultra{ background:var(--ultra-thin); }
    .m-thin{  background:var(--thin); }
    .m-regular{ background:var(--regular); }
    .m-thick{          background:var(--thick); }

    .map-wrap{position:relative;border-radius:20px;overflow:hidden;height:220px;flex-shrink:0;}
    .map-canvas{position:absolute;inset:0;width:100%;height:100%;opacity:0;transition:opacity 1s ease;}
    .map-canvas.loaded{opacity:1;}

    .no-scroll::-webkit-scrollbar{display:none}
    .no-scroll{-ms-overflow-style:none;scrollbar-width:none}

    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{animation:spin .8s linear infinite;}

    .tog{width:42px;height:24px;border-radius:12px;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;}
    .tog-k{position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.4);transition:transform .22s cubic-bezier(.34,1.56,.64,1);}

    .seg{display:flex;background:var(--thin);border-radius:16px;padding:6px;gap:6px;}
    .seg-btn{flex:1;padding:12px 8px;border-radius:12px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;transition:background .15s,color .15s;}

    .srch::placeholder{color:var(--text-dim);}
    .srch::-webkit-search-cancel-button,.srch::-webkit-search-decoration{-webkit-appearance:none;}

    @keyframes slideIn{from{transform:translateX(100%)}to{transform:none}}
    .panel-in{animation:slideIn .32s cubic-bezier(.32,.72,0,1) both;}

    .acc-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .35s ease,opacity .25s ease;opacity:0;}
    .acc-body.open{grid-template-rows:1fr;opacity:1;}
    .acc-inner{min-height:0;overflow:hidden;}

    .section-label{ display:flex;align-items:center;gap:10px; padding:0;margin-bottom:10px; }
    .section-label-pill{ display:inline-flex;align-items:center;gap:6px;flex-shrink:0; padding:4px 11px; background:var(--thin); border:1px solid var(--border-light); border-radius:20px; }
    .section-label-line{ flex:1;height:1px; background:linear-gradient(90deg,var(--border-light) 0%,transparent 100%); }
  </style>
</head>
<body>
<div id="root"><div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.4);font-size:14px;gap:10px;"><div class="spin" style="width:18px;height:18px;border-radius:50%;border:2px solid rgba(72,198,239,.3);border-top-color:#48C6EF;"></div>Loading…</div></div>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo} = React;

/* ═══════════════════════════════════════════════════════
   DYNAMIC MAPS LOADER
═══════════════════════════════════════════════════════ */
let _mapPromise = null;
const loadGoogleMaps = async () => {
  if (window.google && window.google.maps) return;
  if (_mapPromise) return _mapPromise;
  
  _mapPromise = new Promise(async (resolve, reject) => {
    try {
      const response = await fetch('/api/get-map-key');
      if (!response.ok) throw new Error('API route failed');
      const data = await response.json();
      
      const script = document.createElement('script');
      script.src = `https://maps.googleapis.com/maps/api/js?key=${data.key}&v=beta`;
      script.async = true; script.defer = true;
      script.onload = resolve;
      script.onerror = reject;
      document.head.appendChild(script);
    } catch (error) {
      console.error("Maps Loader Error:", error);
      reject(error);
    }
  });
  return _mapPromise;
};

/* ═══════════════════════════════════════════════════════
   HELPERS & CONSTANTS
═══════════════════════════════════════════════════════ */
const cvtT = (v,i) => { if(v==="--"||v==null) return "--"; return i ? Math.round(v*9/5+32) : v; };
const cvtW = (v,i) => { if(v==="--"||v==null) return "--"; return i ? Math.round(v*.621371) : v; };
const cvtV = (v,i) => { if(v==="--"||v==null) return "--"; return i ? Math.round(v*.621371*10)/10 : v; };
const tU = i => i?"°F":"°C";
const wU = i => i?"mph":"km/h";
const vU = i => i?"mi":"km";

const resolveTheme = (pref,sysDark) => pref==="dark"? "dark": pref==="light"? "light": (sysDark?"dark":"light");

const DARK_MAP_STYLES = [
  { elementType: "geometry", stylers: [{ color: "#242f3e" }] },
  { elementType: "labels.text.stroke", stylers: [{ color: "#242f3e" }] },
  { elementType: "labels.text.fill", stylers: [{ color: "#746855" }] },
  { featureType: "road", elementType: "geometry", stylers: [{ color: "#38414e" }] },
  { featureType: "water", elementType: "geometry", stylers: [{ color: "#17263c" }] }
];

const I={
  Search:({s=16,c="currentColor"})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  Cog:({s=18,c="currentColor"})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
  X:({s=16,c="currentColor"})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>,
  Up:({s=13,c="currentColor"})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"/></svg>,
  Pin:({s=14,c="currentColor"})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
  Bell:({s=15,c="currentColor"})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
  Wifi0:({s=14,c="currentColor"})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.56 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>,
  Sun2:({s=14,c="currentColor"})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/></svg>,
};

/* ═══════════════════════════════════════════════════════
   COMPONENTS
═══════════════════════════════════════════════════════ */
const MapHero=({isDark,coords,activeLocation,lowSig,onExitLowSig})=>{
  const mapRef=useRef(null), instRef=useRef(null), markerRef=useRef(null);

  if(lowSig){
    return(
      <div style={{height:"220px",borderRadius:"20px",background:"linear-gradient(160deg,#1a2a4a,#0d1828)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px",border:"1px solid var(--border-light)"}}>
        <div style={{opacity:0.4,marginBottom:"12px"}}><I.Wifi0 s={32}/></div>
        <span style={{fontSize:"13px",color:"var(--text-dim)",textAlign:"center",marginBottom:"16px"}}>Map unavailable in Low Signal mode</span>
        <button onClick={onExitLowSig} style={{padding:"10px 22px",borderRadius:"20px",background:"var(--thin)",border:"1px solid var(--border-light)",color:"var(--text-main)",fontSize:"12px",fontWeight:700,cursor:"pointer"}}>Exit Low Signal Mode</button>
      </div>
    );
  }

  useEffect(()=>{
    let unmounted=false;
    const tryInit= async ()=>{
      if(unmounted||!mapRef.current) return;
      try {
        if(!window.google || !window.google.maps) await loadGoogleMaps();
        if(instRef.current) return;
        const lat=coords?.lat!=null?Number(coords.lat):11.5728, lng=coords?.lon!=null?Number(coords.lon):76.0808;
        const map=new window.google.maps.Map(mapRef.current,{
          center:{lat,lng},zoom:13.5, tilt:45, disableDefaultUI:true, gestureHandling:"none", scrollwheel:false,
          styles:isDark?DARK_MAP_STYLES:[],
        });
        instRef.current=map;
        markerRef.current=new window.google.maps.Marker({
          position:{lat,lng},map,icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:8,fillColor:"#48C6EF",fillOpacity:1,strokeColor:"white",strokeWeight:2.5},
        });
        map.addListener("tilesloaded",()=>mapRef.current?.classList.add("loaded"));
      } catch(e){}
    };
    tryInit();
    return()=>{ unmounted=true; if(markerRef.current) markerRef.current.setMap(null); };
  },[]);

  useEffect(()=>{
    if(instRef.current){
      const lat=Number(coords.lat), lng=Number(coords.lon);
      instRef.current.panTo({lat,lng});
      markerRef.current?.setPosition({lat,lng});
    }
  },[coords.lat,coords.lon]);

  useEffect(()=>{
    if(instRef.current) instRef.current.setOptions({styles:isDark?DARK_MAP_STYLES:[]});
  },[isDark]);

  return <div className="map-wrap"><div ref={mapRef} className="map-canvas" style={{filter:isDark?"brightness(0.9)":"brightness(0.95)"}}/></div>;
};

const PanelHeader=({title,onBack})=>(
  <div style={{padding:"calc(var(--sat,0px) + 24px) 24px 0",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"24px"}}>
    <div style={{fontFamily:"'Urbanist',sans-serif",fontSize:"26px",fontWeight:800,color:"var(--text-main)"}}>{title}</div>
    <button onClick={onBack} style={{width:"34px",height:"34px",borderRadius:"50%",background:"var(--thin)",border:"1px solid var(--border-light)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
      <I.X s={16} c="var(--text-main)"/>
    </button>
  </div>
);

const SettingsPanel=({open,onClose,imp,setImp,lowSig,setLowSig,themePref,setThemePref,notifPerm,onRequestNotif,geoState})=>{
  const [showLegal,setShowLegal]=useState(false);
  if(!open) return null;

  const Row=({Icon,title,sub,right})=>(
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 0",borderBottom:"1px solid var(--divider)"}}>
      <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
        {Icon&&<Icon s={14} c="var(--text-sub)"/>}
        <div>
          <div style={{fontSize:"14px",fontWeight:500,color:"var(--text-main)"}}>{title}</div>
          {sub&&<div style={{fontSize:"11.5px",color:"var(--text-sub)",marginTop:"2px"}}>{sub}</div>}
        </div>
      </div>
      {right}
    </div>
  );

  const Category=({t})=>(
    <div style={{fontSize:"10px",fontWeight:700,color:"var(--text-dim)",letterSpacing:"0.12em",textTransform:"uppercase",marginTop:"22px",marginBottom:"4px"}}>{t}</div>
  );

  return(
    <>
      <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",backdropFilter:"blur(8px)",zIndex:150}}/>
      <div className="panel-in" style={{position:"fixed",top:0,right:0,bottom:0,width:"min(360px,94vw)",background:"rgba(20,25,40,0.88)",borderLeft:"1px solid var(--border-light)",zIndex:200,overflowY:"auto"}}>
        {!showLegal ? (
          <div style={{paddingBottom:"40px"}}>
            <PanelHeader title="Settings" onBack={onClose}/>
            <div style={{padding:"0 24px"}}>
              
              <Category t="Appearance"/>
              <div style={{padding:"12px 0",borderBottom:"1px solid var(--divider)"}}>
                <div style={{fontSize:"13px",fontWeight:500,color:"var(--text-main)",marginBottom:"12px"}}>Theme</div>
                <SegCtrl options={THEME_OPTS} value={themePref} onChange={setThemePref}/>
              </div>

              <Category t="Units"/>
              <Row Icon={I.Sun2} title="Measurement" sub={imp?"Imperial — °F, mph":"Metric — °C, km/h"}
                right={<Toggle on={imp} onChange={setImp}/>}/>

              <Category t="Connectivity"/>
              <Row Icon={I.Wifi0} title="Low Signal Mode" sub="Strips map and heavy animations"
                right={<Toggle on={lowSig} onChange={setLowSig}/>}/>

              <Category t="System Status"/>
              <Row Icon={I.Pin} title="Location Status" sub={geoState==="got"?"Active and synced":"Denied — using default"}
                right={<div style={{width:"8px",height:"8px",borderRadius:"50%",background:geoState==="got"?"#22c55e":"#ef4444"}}/>}/>

              <Category t="Notification"/>
              <Row Icon={I.Bell} title="Weather Alerts" sub={notifPerm==="granted"?"Notifications active":"Permissions required"}
                right={notifPerm!=="granted" && <button onClick={onRequestNotif} style={{padding:"6px 12px",borderRadius:"16px",background:"#48C6EF",border:"none",color:"#fff",fontSize:"12px",fontWeight:600}}>Enable</button>}/>

              <Category t="About"/>
              <div onClick={()=>setShowLegal(true)} style={{cursor:"pointer"}}>
                <Row title="Legal & Data Sources" sub="Open-Meteo · Google Maps · OSM"
                  right={<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="9 18 15 12 9 6"/></svg>}/>
              </div>
            </div>
          </div>
        ) : (
          <div>
            <PanelHeader title="Legal Info" onBack={()=>setShowLegal(false)}/>
            <div style={{padding:"0 24px"}}>
               <div style={{fontSize:"13px", color:"var(--text-sub)", lineHeight:1.6}}>
                  Breeze is an experimental weather dashboard. Data provided by Open-Meteo, Air Quality by Copernicus, and Geocoding by OpenStreetMap. All map technologies powered by Google.
               </div>
            </div>
          </div>
        )}
      </div>
    </>
  );
};

/* ═══════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════ */
const App=()=>{
  const [onboarded,setOnboarded]=useState(()=>localStorage.getItem("bz_onboarded")==="true");
  const [imp,setImp]=useState(()=>localStorage.getItem("bz_imp")==="true");
  const [themePref,setThemePref]=useState(()=>localStorage.getItem("bz_theme")||"system");
  const [lowSig,setLowSig]=useState(()=>localStorage.getItem("bz_lowsig")==="true");
  const [sysDark,setSysDark]=useState(()=>window.matchMedia("(prefers-color-scheme:dark)").matches);
  const [settOpen,setSettOpen]=useState(false);
  const [notifPerm,setNotifPerm]=useState(()=>"Notification" in window?Notification.permission:"denied");

  const [coords,setCoords]=useState({lat:11.5728,lon:76.0808});
  const [geoState,setGeoState]=useState("pending");
  const [activeLocation,setActiveLocation]=useState(null);
  const [weatherData,setWeatherData]=useState({cw:null,hourly:[],daily:[],aqi:null,sun:null});
  const [loading,setLoading]=useState(true);

  useEffect(()=>{ localStorage.setItem("bz_imp",imp); },[imp]);
  useEffect(()=>{ localStorage.setItem("bz_theme",themePref); },[themePref]);
  useEffect(()=>{ localStorage.setItem("bz_lowsig",lowSig); },[lowSig]);

  useEffect(()=>{
    const mq=window.matchMedia("(prefers-color-scheme:dark)");
    const h=e=>setSysDark(e.matches);
    mq.addEventListener("change",h);
    return()=>mq.removeEventListener("change",h);
  },[]);

  useEffect(()=>{
    document.documentElement.setAttribute("data-theme", resolveTheme(themePref,sysDark));
  },[themePref,sysDark]);

  useEffect(()=>{
    if(!onboarded) return;
    navigator.geolocation.getCurrentPosition(
      pos=>{setCoords({lat:pos.coords.latitude,lon:pos.coords.longitude});setGeoState("got");},
      ()=>setGeoState("denied"),{timeout:8000}
    );
  },[onboarded]);

  useEffect(()=>{
    let cancelled=false;
    const load=async()=>{
      setLoading(true);
      const data=await fetchWeather(coords.lat,coords.lon);
      if(cancelled||!data) return;
      setWeatherData({cw:data.currentWeather,hourly:data.hourly,daily:data.daily,aqi:data.aqi,sun:data.sun_moon});
      if(!activeLocation) setActiveLocation(data.locationFromApi);
      setLoading(false);
    };
    load();
    return()=> { cancelled=true; };
  },[coords]);

  const isDark=resolveTheme(themePref,sysDark)==="dark";
  const cw=weatherData.cw||{temperature:"--",icon:"🌡️",condition:"Loading…",feelslike:"--"};

  return(
    <div style={{minHeight:"100vh",padding:"16px",display:"flex",flexDirection:"column",gap:"12px",paddingTop:"calc(var(--sat) + 16px)"}}>
      <SearchBar location={activeLocation} onSettings={()=>setSettOpen(true)} onSearch={async q=>{
        try{
          const geo=await geocodeWithOSM(q);
          setCoords({lat:geo.lat,lon:geo.lon});
          setActiveLocation(geo);
        }catch(e){}
      }} loading={loading && !!weatherData.cw}/>

      <MapHero isDark={isDark} coords={coords} lowSig={lowSig} onExitLowSig={()=>setLowSig(false)}/>

      <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
        <HeroCard cw={cw} location={activeLocation} imp={imp}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
          <G level={2} style={{padding:"14px"}}><StatLabel t="Wind"/>{cvtW(cw.windspeed,imp)}{wU(imp)}</G>
          <G level={2} style={{padding:"14px"}}><StatLabel t="Humidity"/>{cw.humidity}%</G>
          <G level={2} style={{padding:"14px"}}><StatLabel t="UV Index"/>{cw.uv_index}</G>
          <G level={2} style={{padding:"14px"}}><StatLabel t="Visibility"/>{cvtV(cw.visibility,imp)}{vU(imp)}</G>
        </div>
        <HourlyScroll hourly={weatherData.hourly} imp={imp}/>
        <DailyAccordion daily={weatherData.daily} imp={imp}/>
      </div>

      <SettingsPanel open={settOpen} onClose={()=>setSettOpen(false)}
        imp={imp} setImp={setImp} lowSig={lowSig} setLowSig={setLowSig}
        themePref={themePref} setThemePref={setThemePref}
        geoState={geoState} notifPerm={notifPerm}
        onRequestNotif={async()=>{const p=await Notification.requestPermission();setNotifPerm(p);}}/>

      {!onboarded && <WelcomeOverlay onComplete={()=>{ localStorage.setItem("bz_onboarded","true"); setOnboarded(true); }}/>}
    </div>
  );
};

const StatLabel=({t})=><div style={{fontSize:"11px",color:"var(--text-sub)",textTransform:"uppercase",marginBottom:"4px"}}>{t}</div>;

const WelcomeOverlay=({onComplete})=>(
  <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(20px)",padding:"24px"}}>
    <div className="material m-thick" style={{padding:"32px",textAlign:"center",maxWidth:"340px"}}>
      <div style={{fontSize:"48px",marginBottom:"16px"}}>🌤️</div>
      <div style={{fontSize:"24px",fontWeight:800,marginBottom:"12px"}}>Breeze</div>
      <div style={{fontSize:"14px",color:"var(--text-sub)",lineHeight:1.6,marginBottom:"24px"}}>Get hyper-local forecasts and severe weather alerts.</div>
      <button onClick={onComplete} style={{width:"100%",padding:"14px",borderRadius:"14px",background:"#48C6EF",border:"none",color:"#fff",fontWeight:700,fontSize:"16px"}}>Let's Go</button>
    </div>
  </div>
);

/* ═══════════════════════════════════════════════════════
   SYSTEM INIT
═══════════════════════════════════════════════════════ */
class ErrorBoundary extends React.Component {
  state={error:null}; static getDerivedStateFromError(e){return{error:e};}
  render(){
    if(this.state.error) return <div style={{padding:"40px",textAlign:"center"}}>⚠️ Breeze crashed. <button onClick={()=>location.reload()}>Reload</button></div>;
    return this.props.children;
  }
}
const el=document.getElementById("root");
ReactDOM.createRoot(el).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
